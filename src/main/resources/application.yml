spring:
  application:
    name: example-app-backend

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/example-app}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:admin}

  jpa:
    properties:
      hibernate:
        default_schema: example-app
      jakarta.persistence.validation.mode: none
    hibernate:
      ddl-auto: validate

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://eddie-demo.projekte.fh-hagenberg.at/iam/realms/EDDIE}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:https://eddie-demo.projekte.fh-hagenberg.at/iam/realms/EDDIE/protocol/openid-connect/certs}

  flyway:
    schemas: example-app

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVER:eddie-demo.projekte.fh-hagenberg.at:5005}
    consumer:
      group-id: ${KAFKA_GROUP_ID:kafka-client-group}
      client-id: ${KAFKA_CLIENT_ID:kafka-client-group}
      properties:
        sasl:
          mechanism: SCRAM-SHA-512
          jaas.config: org.apache.kafka.common.security.scram.ScramLoginModule required username='${KAFKA_USERNAME}' password='${KAFKA_PASSWORD}';
      ssl:
        trust-store-location: classpath:certs/kafka/client.truststore.jks
        trust-store-password: REPLACE_ME

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

    security:
      protocol: SASL_SSL

example-app:
  eddie:
    id: eddie-demo-hardening
    public-url: ${EDDIE_PUBLIC_URL:https://eddie-demo.projekte.fh-hagenberg.at/hardening/eddie}
  kafka:
    message-format: xml
    permission-cim-version: cim_0_82
    validated-historical-data-cim-version: cim_0_82
  mqtt:
    server-uri: ${MQTT_SERVER_URI:tcp://eddie-demo.projekte.fh-hagenberg.at:5105}
    client-id: ${MQTT_CLIENT_ID:example-app-mqtt-client}
    username: ${MQTT_USERNAME}
    password: ${MQTT_PASSWORD}
    rtd-topic: ${MQTT_RTD_TOPIC:aiida/v1/+/data/outbound}

  rtd-lifetime-window-minutes: 15

dataNeeds:
  url: ${example-app.eddie.public-url}/data-needs